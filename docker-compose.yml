services:
  mysql:
    image: mysql:8.0
    container_name: aplicaciones-grupo2-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecomerce_db
      MYSQL_USER: ecomerce
      MYSQL_PASSWORD: ecomerce123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./bdd:/docker-initdb:ro
      - ./bdd/run-init.sh:/docker-entrypoint-initdb.d/00-run-bdd.sh:ro

volumes:
  mysql_data: